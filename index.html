<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="App de transporte público en República Dominicana">
    <meta name="theme-color" content="#2563eb">
    <title data-i18n="appTitle">🇩🇴 Rutas RD</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E🚌%3C/text%3E%3C/svg%3E">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="header">
        <div class="header__container">
            <h1 class="header__title" data-i18n="appTitle">🇩🇴 Rutas RD</h1>
            <div class="header__controls">
                <button class="btn-icon" id="btn-info" title="Ver información">ℹ️</button>
                <button class="btn-icon" id="btn-data-saver" title="Modo ahorro de datos">💾</button>
                <button class="btn-icon" id="btn-lang" title="Cambiar idioma">EN</button>
                <button class="btn-icon" id="btn-theme" title="Cambiar tema">🌙</button>
            </div>
        </div>
    </header>

    <main class="container">
        <div id="alerts-container" class="alerts"></div>

        <div id="info-panel" class="info-panel" style="display: none;">
            <div class="info-panel__header">
                <h3 data-i18n="routeInfo">📊 Información de Ruta</h3>
                <button class="btn-close" onclick="cerrarInfo()">✕</button>
            </div>
            <div class="info-panel__content" id="info-content">
                <p data-i18n="selectRouteInfo">Selecciona una ruta para ver los detalles</p>
            </div>
        </div>

        <section class="search-card">
            <h2 class="search-title" data-i18n="searchTitle">🔍 Buscar Ruta</h2>
            <form id="search-form">
                <div class="form-grid">
                    <div class="form-group">
                        <label data-i18n="origin">📍 Origen</label>
                        <select id="origen" required>
                            <option value="" data-i18n="selectOrigin">Selecciona...</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label data-i18n="destination">🎯 Destino</label>
                        <select id="destino" required>
                            <option value="" data-i18n="selectOrigin">Selecciona...</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label data-i18n="transport">🚌 Transporte</label>
                        <select id="transporte">
                            <option value="todos" data-i18n="all">Todos</option>
                            <option value="bus" data-i18n="bus">🚌 Bus</option>
                            <option value="carro" data-i18n="car">🚗 Carro</option>
                            <option value="moto" data-i18n="moto">🏍️ Moto</option>
                        </select>
                    </div>
                </div>
                <button type="submit" class="btn-search" data-i18n="search">🔎 Buscar</button>
            </form>
        </section>

        <section class="map-card">
            <h3 class="map-title" data-i18n="map">🗺️ Mapa</h3>
            <div class="map-container">
                <svg id="mapa" class="map-svg" viewBox="0 0 100 100"></svg>
            </div>
            <p class="map-hint" data-i18n="mapHint">💡 Selecciona un transporte específico para ver la ruta</p>
        </section>

        <section id="results-section" style="display: none;">
            <div class="results-header">
                <h3 class="results-title" data-i18n="routesFound">📋 Rutas Encontradas</h3>
                <span id="results-count" class="results-count">0</span>
            </div>
            <div id="routes-container" class="routes-grid"></div>
        </section>

        <div id="empty-state" class="empty-state">
            <div class="empty-icon">🗺️</div>
            <h3 class="empty-title" data-i18n="noRoutes">No hay rutas</h3>
            <p class="empty-text" data-i18n="noRoutesText">Intenta con otra combinación</p>
        </div>
    </main>

    <footer class="footer">
        <p data-i18n="footer">© 2026 Proyecto Estudiantil - Rutas RD 🇩🇴</p>
    </footer>

    <script src="app.js"></script>
</body>
</html>
